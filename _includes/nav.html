<!-- Navigation -->
<nav class="navbar navbar-default navbar-custom navbar-fixed-top">
    <div class="container-fluid">
        <!-- Brand and toggle get grouped for better mobile display -->
        <div class="navbar-header page-scroll">
            <button type="button" class="navbar-toggle" data-toggle="collapse" data-target="#bs-example-navbar-collapse-1">
                <span class="sr-only">Toggle navigation</span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
            </button>
            <!-- <a class="navbar-brand" href="{{ site.baseurl }}/">{{ site.user }}</a> -->
            <span class="navbar-brand">
              <img src="{ site.logo }}" width="45" height="45" alt="R12Leal" class="img-responsive" style="border-radius: 6px;margin-top: -12px;">
            </span>
        </div>
        <!-- Collect the nav links, forms, and other content for toggling -->
        <div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">
            <ul class="nav navbar-nav navbar-right">
                <li>
                <a href="{{ site.baseurl }}/"><i class="fa fa-home"></i> Home</a></li>
                {% for page in site.pages reversed %}{% if page.title %}
                  {% if page.url != '/404.html' %}
                    <li>
                        <a href="{{ page.url | prepend: site.baseurl }}">
                            <i class="fa fa-{{ page.ico }}"></i> {{ page.title }}
                        </a>
                    </li>
                  {% endif %}
                {% endif %}{% endfor %}
            </ul>
        </div>
        <!-- /.navbar-collapse -->
    </div>
    <!-- /.container -->
</nav>
